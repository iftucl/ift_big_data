# citation: template borrowed from pandas
name: Documentation Improvement
description: Report wrong or missing documentation
title: "DOC: "
labels: [Docs, Needs Triage]

body:
  - type: checkboxes
    attributes:
      label: ift_big_data version checks
      options:
        - label: >
            I have checked that the issue still exists on the latest versions of the docs
          required: true
  - type: textarea
    id: location
    attributes:
      label: Location of the documentation
      description: >
        Add here where you'd like to see the new documentation pages
      placeholder: https://iftucl.github.io/ift_big_data/
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Documentation problem
      description: >
        Please provide a description of what documentation you believe needs to be fixed/improved
    validations:
      required: true
  - type: textarea
    id: suggested-fix
    attributes:
      label: Suggested fix for documentation
      description: >
        Please explain the suggested fix and **why** it's better than the existing documentation
    validations:
      required: true